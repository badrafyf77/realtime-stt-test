services:
  realtime-stt:
    build:
      context: .
    image: realtime-stt-darija:latest
    ports:
      - "${PORT:-8085}:8085"
    environment:
      HOST: 0.0.0.0
      PORT: 8085
      STT_MODEL: aioxlabs/dvoice-darija
      STT_REALTIME_MODEL: /models/darija
      STT_DISPLAY_MODEL: aioxlabs/dvoice-darija
      STT_DISPLAY_REALTIME_MODEL: anaszil/whisper-large-v3-turbo-darija
      STT_USE_MAIN_MODEL_FOR_REALTIME: "true"
      STT_LANGUAGE: ar
      STT_DEVICE: cuda
      STT_COMPUTE_TYPE: float16
      STT_DOWNLOAD_ROOT: /models
      SPEECHBRAIN_SAVEDIR: /models/speechbrain/asr-wav2vec2-dvoice-dar
      TORCH_HOME: /opt/torch-cache
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./models/darija:/models/darija:ro
      - ./models/speechbrain:/models/speechbrain
    runtime: nvidia
    shm_size: "2gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10m
